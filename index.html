<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delinternet — PC HARD ara és Delinternet</title>
<meta name="description" content="PC HARD passa a ser Delinternet. La companyia de telecomunicacions de les Terres de l'Ebre.">
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'General Sans', sans-serif;
    background: linear-gradient(135deg, #fbfdf4 0%, #edf6d8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Decoracions de fons */
  .bg-shape {
    position: absolute;
    z-index: 0;
    opacity: 0.4;
    pointer-events: none;
  }
  .bg-shape-1 {
    top: -10%;
    left: -5%;
    width: 400px;
    max-width: 50vw;
  }
  .bg-shape-2 {
    bottom: -10%;
    right: -5%;
    width: 350px;
    max-width: 45vw;
  }
  .bg-shape-3 {
    top: 50%;
    left: 80%;
    transform: translate(-50%, -50%);
    width: 250px;
    max-width: 30vw;
    opacity: 0.15;
  }
  .bg-shape-4 {
    bottom: 10%;
    left: 10%;
    width: 200px;
    max-width: 30vw;
    transform: rotate(-15deg);
    opacity: 0.25;
  }

  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: clamp(1.5rem, 5vw, 2rem);
    max-width: 900px;
    width: 100%;
  }

  h1 {
    font-family: 'Carnas Light', 'Carnas', sans-serif;
    font-size: clamp(2rem, 7vw, 4.5rem);
    font-weight: normal;
    color: #1a1a1a;
    line-height: 1.2;
    margin-bottom: clamp(1rem, 4vw, 2rem);
  }

  h1 span {
    color: #F5CA00; /* Groc com a la imatge */
    font-weight: 600;
  }

  .logo {
    display: block;
    margin: 0 auto clamp(1.5rem, 5vw, 3rem);
    height: clamp(70px, 12vw, 140px);
    width: auto;
    max-width: 100%;
  }

  .subtitle {
    font-size: clamp(1.1rem, 4.5vw, 2.1rem);
    color: #333;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: clamp(1.5rem, 5vw, 3.5rem);
  }

  .highlight {
    font-size: clamp(1.2rem, 5vw, 2.3rem);
    color: #b2c900;
    font-weight: 700;
    margin-bottom: clamp(2rem, 6vw, 4rem);
  }

  .btn {
    display: inline-block;
    background: #C3D500;
    color: #1a1a1a;
    font-family: inherit;
    font-weight: 700;
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    text-decoration: none;
    padding: clamp(14px, 3vw, 22px) clamp(32px, 6vw, 64px);
    border-radius: 99px; /* Forma de píndola com a la imatge */
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .btn:hover {
    background: #a9ba00;
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <!-- Imatges de fons decoratives (asset, asset2 i 236) -->
  <img src="assets/img/asset.png" alt="" class="bg-shape bg-shape-1">
  <img src="assets/img/asset2.png" alt="" class="bg-shape bg-shape-2">
  <img src="assets/img/236.png" alt="" class="bg-shape bg-shape-3">
  <img src="assets/img/236.png" alt="" class="bg-shape bg-shape-4">

  <div class="card">
    <h1>Ara, <span>PC HARD</span> som</h1>
    <img src="assets/img/logo-b.png" alt="Delinternet" class="logo">
    <p class="subtitle">La companyia de telecomunicacions<br>de les Terres de l'Ebre</p>
    <p class="highlight">Xarxa de fibra 100% ebrenca</p>
    <a href="https://delinternet.com" target="_blank" rel="noopener" class="btn">Ens veiem a delinternet</a>
  </div>

  <script>
    // Redirecció automàtica passats 12 segons exactes
    setTimeout(() => {
      window.location.href = "https://delinternet.com";
    }, 12000);
  </script>
</body>
</html>

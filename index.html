<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delinternet — PC HARD ara és Delinternet</title>
<meta name="description" content="PC HARD passa a ser Delinternet. La companyia de telecomunicacions de les Terres de l'Ebre.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(135deg, #fbfdf4 0%, #edf6d8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Decoracions de fons */
  .bg-shape {
    position: absolute;
    z-index: 0;
    opacity: 0.4;
    pointer-events: none;
  }
  .bg-shape-1 {
    top: -10%;
    left: -5%;
    width: 400px;
    max-width: 50vw;
  }
  .bg-shape-2 {
    bottom: -10%;
    right: -5%;
    width: 350px;
    max-width: 45vw;
  }
  .bg-shape-3 {
    top: 50%;
    left: 80%;
    transform: translate(-50%, -50%);
    width: 250px;
    max-width: 30vw;
    opacity: 0.15;
  }
  .bg-shape-4 {
    bottom: 10%;
    left: 10%;
    width: 200px;
    max-width: 30vw;
    transform: rotate(-15deg);
    opacity: 0.25;
  }

  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    max-width: 800px;
    width: 100%;
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.2;
    margin-bottom: 2rem;
  }

  h1 span {
    color: #F5CA00; /* Groc com a la imatge */
    font-weight: 600;
  }

  .logo {
    display: block;
    margin: 0 auto 2.5rem;
    height: 110px; /* Molt més gran per coincidir millor */
    width: auto;
  }

  .subtitle {
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    color: #333;
    font-weight: 400;
    line-height: 1.4;
    margin-bottom: 3.5rem;
  }

  .highlight {
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    color: #b2c900;
    font-weight: 600;
    margin-bottom: 3.5rem;
  }

  .btn {
    display: inline-block;
    background: #C3D500;
    color: #1a1a1a;
    font-family: inherit;
    font-weight: 600;
    font-size: 1.4rem;
    text-decoration: none;
    padding: 18px 56px;
    border-radius: 99px; /* Forma de píndola com a la imatge */
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .btn:hover {
    background: #a9ba00;
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <!-- Imatges de fons decoratives (asset, asset2 i 236) -->
  <img src="assets/img/asset.png" alt="" class="bg-shape bg-shape-1">
  <img src="assets/img/asset2.png" alt="" class="bg-shape bg-shape-2">
  <img src="assets/img/236.png" alt="" class="bg-shape bg-shape-3">
  <img src="assets/img/236.png" alt="" class="bg-shape bg-shape-4">

  <div class="card">
    <h1>Ara, <span>PC HARD</span> som</h1>
    <img src="assets/img/logo-b.png" alt="Delinternet" class="logo">
    <p class="subtitle">La companyia de telecomunicacions<br>de les Terres de l'Ebre</p>
    <p class="highlight">Xarxa de fibra 100% ebrenca</p>
    <a href="https://delinternet.com" target="_blank" rel="noopener" class="btn">Ens veiem a delinternet</a>
  </div>

  <script>
    // Redirecció automàtica passats 20 segons exactes
    setTimeout(() => {
      window.location.href = "https://delinternet.com";
    }, 20000);
  </script>
</body>
</html>

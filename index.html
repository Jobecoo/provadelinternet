<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delinternet — PCHARD passa a ser Delinternet</title>
<meta name="description" content="PCHARD passa a ser Delinternet. L'operadora local de les Terres de l'Ebre.">
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'General Sans', sans-serif;
    background: linear-gradient(135deg, #f5f5f5 0%, #e8f5d0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    text-align: center;
    padding: clamp(2.5rem, 6vw, 5rem) clamp(1.5rem, 6vw, 4rem);
    max-width: 620px;
    width: 100%;
  }

  .label {
    display: inline-block;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #5a8a00;
    background: #dff0b0;
    border-radius: 99px;
    padding: 5px 16px;
    margin-bottom: 2rem;
  }

  .logos-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2.5rem;
  }

  .logos-row img { height: 80px; width: auto; }
  .logos-row .sep { font-size: 2.5rem; color: #bbb; line-height: 1; font-weight: 300; }

  h1 {
    font-size: clamp(1.9rem, 5vw, 3rem);
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.15;
    margin-bottom: 1rem;
  }

  h1 span { color: #B9D205; }

  p {
    font-size: 1.1rem;
    color: #555;
    line-height: 1.75;
    margin-bottom: 2.5rem;
    max-width: 460px;
    margin-left: auto;
    margin-right: auto;
  }

  .btn {
    display: inline-block;
    background: #B9D205;
    color: #1a1a1a;
    font-family: inherit;
    font-weight: 600;
    font-size: 1.05rem;
    letter-spacing: 0.03em;
    text-decoration: none;
    padding: 16px 48px;
    border-radius: 8px;
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .btn:hover {
    background: #9AB504;
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <div class="card">
    <span class="label">Connexió de confiança</span>
    <div class="logos-row">
      <img src="assets/img/logo-b.png" alt="Delinternet">
      <span class="sep">&times;</span>
      <img src="assets/img/pchard-logo.png" alt="PCHARD">
    </div>
    <h1>Ara PCHARD passa a ser <span>Delinternet</span></h1>
    <p>El servei que coneixes ara amb una marca nova. Mateixa qualitat, mateixa atenció local, nous horitzons.</p>
    <a href="https://delinternet.com" target="_blank" rel="noopener" class="btn">VES A DELINTERNET &rarr;</a>
  </div>
